version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: carpro-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: always

  backend:
    build: ./backend
    container_name: carpro-backend
    ports:
      - "5000:5000"   # 🔥 МАҢЫЗДЫ: backend портын аштық
    environment:
      NODE_ENV: production
      PORT: 5000

      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_NAME: authapp
      DB_USER: postgres
      DB_PASSWORD: postgres

      JWT_SECRET: change_this_secret_in_production
      FRONTEND_URL: http://localhost

      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: carpro-uploads

    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      - minio
    restart: always

  frontend:
    build: ./frontend
    container_name: carpro-frontend
    ports:
      - "80:80"     
    depends_on:
      - backend
    restart: always

volumes:
  backend_uploads:
  minio_data: